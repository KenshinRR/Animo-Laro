<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animo Laro - Log in</title>
    <script src="../JavaScripts/theme_loader.js"></script>
    <link rel="stylesheet" href="../Styles/login_page.css" />
  </head>
  <body class="login_main_container">
    <div class="boxContainer">
      <div class="box">
        <h1 class="title_header">Animo-Laro</h1>
        <p class="par">
          Discover, play, and discuss games made by DLSU students.
        </p>
      </div>
      <hr class="hrLine" />
      <div class="box">
        <form id="log_in">
          <div>
            <input
              class="inputText"
              type="text"
              placeholder="Username"
              required
              id="username"
            />
            <br />
            <input
              class="inputText"
              type="password"
              placeholder="Password"
              required
              id="password"
            />
          </div>
          <div class="remember_me">
            <input type="checkbox" id="remember_me" />
            Remember me (for 30 days)
          </div>

          <button type="submit" class="log_in_button">Log In</button>
          <!--button test click-->
          <!--<button type="submit" class="log_in_button" onclick="window.open('main_feed.html')">Log In</button>-->
        </form>
        <p class="par">
          Don't have an account?

          <a href="registration_page.html" class="link">Register</a>
        </p>
      </div>
    </div>
    <script src="../JavaScripts/log_in.js"></script>
  </body>
</html>
