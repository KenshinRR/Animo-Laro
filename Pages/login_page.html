<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animo Laro - Log in</title>
    <script src="../JavaScripts/theme_loader.js"></script>
    <link rel="stylesheet" href="../Styles/login_page.css" />
  </head>
  <body class="login_main_container">
    <main class="boxContainer">
      <section class="box">
        <h1 class="title_header">Animo-Laro</h1>
        <p class="par">
          Discover, play, and discuss games made by DLSU students.
        </p>
      </section>
      <hr class="hrLine" />
      <section class="box">
        <form class ="log_in" id="log_in">
            <input
              class="inputText"
              type="text"
              placeholder="Username"
              id="username"
              required
              autocomplete="off"
            />

            <input
              class="inputText"
              type="password"
              placeholder="Password"
              id="password"
              required
              autocomplete="off"
            />
          <div class="remember_me" title="Stay log in for 30 days">
            <input type="checkbox" id="remember_me" />
            <label for="remember_me">Remember me</label>
          </div>

          <button type="submit" class="log_in_button">Log In</button>
          <!--button test click-->
          <!--<button type="submit" class="log_in_button" onclick="window.open('main_feed.html')">Log In</button>-->
        </form>
        <p class="par">
          <span>Don't have an account?</span>
          <a href="registration_page.html" class="link">Register</a>
        </p>
      </section>
    </main>
    <script src="../JavaScripts/log_in.js"></script>
  </body>
</html>
