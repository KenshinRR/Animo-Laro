<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animo Laro - Log in</title>

    <link rel="stylesheet" href="../Styles/login_page.css" />
  </head>
  <body class="login_main_container">
    <div class="boxContainer">
      <div class="box">
        <h1 class="title_header">Animo-Laro</h1>
        <p class="par">
          Discover, play, and discuss games made by DLSU students.
        </p>
      </div>
      <hr class="hrLine" />
      <div class="box">
        <form>
          <div>
            <input
              class="inputText"
              type="text"
              placeholder="Email or username"
              required
            />
            <br />
            <input
              class="inputText"
              type="text"
              placeholder="Password"
              required
            />
          </div>
          <button type="submit" class="log_in_button">Log In</button>
        </form>
        <p class="par">
          Don't have an account?
          <a href="registration_page.html">Register</a>
        </p>
      </div>
    </div>

</html>
