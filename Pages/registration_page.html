<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animo Laro - Create an account</title>
    <script src="../JavaScripts/theme_loader.js"></script>
    <link rel="stylesheet" href="../Styles/register_page.css" />
  </head>
  <body class="register_main_container">
    <div class="boxContainer">
      <div class="box">
        <h1 class="title_header">Animo-Laro</h1>
      </div>
      <hr class="hrLine" />
      <div class="box">
        <h1 class="par">Create a new account</h1>
        <div>
          <form class="form_box" id="register_form">
            <input
              class="inputText"
              type="text"
              placeholder="Username"
              id="username"
              required
            />
            <input
              class="inputText"
              type="text"
              placeholder="Password"
              id="password"
              required
            />
            <button type="submit" class="register_button">Register</button>
          </form>
          <pre>
          <a href="login_page.html" class="link">Go back to log in</a>
          </pre>
        </div>
      </div>
    </div>
    <script src="../JavaScripts/register.js"></script>
  </body>
</html>
