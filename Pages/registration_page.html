<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animo Laro - Create an account</title>
    <script src="../JavaScripts/theme_loader.js"></script>
    <link rel="stylesheet" href="../Styles/register_page.css" />
  </head>
  <body class="register_main_container">
    <main class="boxContainer">
      <section class="box">
        <h1 class="title_header">Animo-Laro</h1>
      </section>
      <hr class="hrLine" />
      <section class="box">
        <h1 class="par">Create a new account</h1>
        <div>
          <form class="form_box" id="register_form" novalidate>
            <input
              class="inputText"
              type="text"
              placeholder="Username"
              id="username"
              autocomplete="off"
            />
            <input
              class="inputText"
              type="password"
              placeholder="Password"
              id="password"
              autocomplete="off"
            />
            <p class="error-msg" id="error-msg"></p>
            <button type="submit" class="register_button">Register</button>
          </form>
          <p class="par">
            <a href="login_page.html" class="link">Go back to log in</a>
          </p>
        </div>
      </section>
    </main>
    <script src="../JavaScripts/register.js"></script>
  </body>
</html>
