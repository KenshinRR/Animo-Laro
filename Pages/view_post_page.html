<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Post</title>

    <link rel="stylesheet" href="../Styles/view_post_page.css">
</head>

<body class="main_body">

    <div class="header_container">
        <button class="back_button" id="back_button">
            <img class="back_icon" src="../View/System Images/Icons/Left-Arrow.png">
        </button>
    </div>

    <div class="title_container">

        <h1 id="post_title">Title of post here</h1> <!-- From Database -->
        <h2 id="poster_name">Jane Doe</h2> <!-- From Database -->

        <p id="post_description">
            Lorem ipsum dolor sit amet consectetur adipisicing elit...
        </p>

        <div class="images_container">
            <img src="../View/MMM Poster (1).png">
            <img src="../View/MMM Poster (2).png">
            <img src="../View/MMM Poster (1).png">
            <img src="../View/MMM Poster (2).png">
        </div>
        
        <div class="game_link_container">
            
        </div>

        <div class="post_vote_container">
            <span id="post_likes_display">Likes: 0</span>
            <div class="vote_buttons">
                <button id="post_like_btn">Like</button>
                <button id="post_dislike_btn">Dislike</button>
            </div>
        </div>

    </div>

    <div class="comments_section">

        <h2>Comments</h2>

        <form id="comment_form">
            <textarea id="comment_input" rows="3" placeholder="Write a comment..."></textarea>
            <input type="submit" value="Post Comment">
        </form>

        <div id="comments_container"></div>

    </div>

    <script src="../JavaScripts/theme_loader.js"></script>
    <script src="../JavaScripts/comments.js"></script>
    <script src="../JavaScripts/view_specific_post_handler.js"></script>
    <script src="../JavaScripts/page_reloader.js"></script>
</body>
</html>
