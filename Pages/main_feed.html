<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

            </button>
            <input class="search_bar" type="text">
            <button class="login_button" id="login_button">Log In</button>

        </div>
        <div class="main_div">
            <div class="left_bar_container" id="left_bar_container">

                    <img class="left_bar_profile_icon" src="../Images/Avatars/CluckingChickenIdleSide.gif">

                    <br><button id="left_bar_edit_profile">Edit Profile</button>

            </div>
            <div class="main_feed_container" id="main_feed_container">

                </div>

    <script src="/JavaScripts/theme_loader.js"></script>
